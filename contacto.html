<!DOCTYPE html>

<head>
    <script src="https://kit.fontawesome.com/a358b09030.js" crossorigin="anonymous"></script>
    <meta charset="utf-8">
    <title>Flymovie Fotografía - Contacto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./css/estilo-contacto.css">
    <link rel="icon" href="./imagenes/logos/favicon.png?">
    <meta name="description" content="¿Listo para convertir tu visión en realidad? 
    ¡Contáctanos hoy mismo en Flymovie Fotografía para reservar tu fecha y comenzar a planificar los recuerdos de tu boda! 
    Estamos aquí para ayudarte en cada paso del camino.">
</head>

<body>
    <header class="main-header">
        <div class="div-logo">
            <a href="index-2.html"><img class="logo" src="./imagenes/logos/logo.png" alt=""></a>
        </div>
        <label for="btn-nav" class="btn-nav">
            <i class="fa fa-bars"></i>
        </label>
        <input type="checkbox" id="btn-nav">
        <nav>
            <ul class="navigation">
                <li><a href="portfolio.html">PORTFOLIO</a></li>
                <li><a href="filmografia.html">FILMOGRAFÍA</a></li>
                <li><a href="blog.html">BLOG</a></li>
                <li><a href="contacto.html">CONTACTO</a></li>
            </ul>
        </nav>
    </header>
    <div class="contact-container">
        <div class="left-col">
        </div>
        <div class="right-col">
            <h1 class="titulo">Contacta con nosotros</h1>
            <p class="p-form-up">Envianos un mensaje y nos pondremos en contacto contigo lo mas rápido posible.</p>
            <form id="contact-form" method="post" action="">
                <label class="labelform" for="nombre">Nombre y apellidos</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre y apellidos" required>
                <label class="labelform" for="telefono">Teléfono</label>
                <input type="tel" pattern="[0-9]{9}" id="telefono" name="telefono" placeholder="123456789" maxlength="9" required>
                <label class="labelform" for="email">E-Mail</label>
                <input type="email" id="email" name="email" placeholder="Tu correo electrónico" autocomplete="email" required>
                <label class="labelform" for="mensaje">Mensaje</label>
                <textarea rows="6" placeholder="Mensaje" id="mensaje" name="mensaje" required></textarea>
                <button class="enviar" type="submit" id="submit" name="submit">Enviar</button>
                <button class="enviar" type="reset" id="reset" name="reset">Borrar</button>
            </form>
            <div class="contact-icons">
                <div class="location">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="p-form">Úbeda, Jaén</p>
                </div>
                <div class="phone">
                    <i class="fa-solid fa-phone"></i>
                    <p class="p-form">+34 627 124 663</p>
                </div>
                <div class="mail">
                    <i class="fa-solid fa-envelope"></i>
                    <p class="p-form">flymoviedron@gmail.com</p>
                </div>
            </div>
            <hr class="diferencia">
        </div>
    </div>
    <div class="whats-float">
        <a href="https://wa.me/message/W7SB2ZAGE6F2E1" target="_blank">
            <i class="fa fa-whatsapp"></i><span>WhatsApp<br><small>+34 627 124 663</small></span>
        </a>
    </div>
    <footer class="pie">
        <div class="pie-child">
            <div class="div-logo-pedro">
                <a href="./index-2.html">
                    <img class="logo-pedro" src="./imagenes/logos/logo_pedro_blanco.png" alt="">
                </a>
            </div>
            <div class="div-footer-p">
                <p>
                    © COPYRIGHT FLYMOVIE | TODOS LOS DERECHOS RESERVADOS
                </p>
            </div>
            <div class="social-media">
                <div class="div-facebook">
                    <a class="facebook" href="https://www.facebook.com/flymovie/">
                        <i class="fa fa-facebook" aria-hidden="true"></i>
                    </a>
                </div>
                <div class="div-youtube">
                    <a class="youtube" href="https://www.youtube.com/channel/UCYPESTzCiSiM4y74VpDWJyg">
                        <i class="fa fa-youtube" aria-hidden="true"></i>
                    </a>
                </div>
                <div class="div-flymovie">
                    <a href="./flymovie/index.html">
                        <img class="flymovie" src="./imagenes/logos/logo_flymovie_blanco.png" alt="">
                    </a>
                </div>
                <div class="div-instagram">
                    <a class="instagram" href="https://www.instagram.com/flymoviedron_fotografia/">
                        <i class="fa fa-instagram" aria-hidden="true"></i>
                    </a>
                </div>
                <div class="div-google">
                    <a class="google" href="https://www.google.com/search?q=Flymovie%20Fot%C3%B3grafos%20Rese%C3%B1as&rflfq=1&num=20&stick=H4sIAAAAAAAAAONgkxI2MzYyMzS2MDKzMDcwNLUwtjS12MDI-IpR1i2nMje_LDNVwS2_5PDm9KLEtPxihaDU4tTDGxOLF7HilwcA2GlNVFoAAAA&rldimm=6326138268701583958&tbm=lcl&cs=1&hl=es&sa=X&ved=0CA8Q5foLahcKEwiI-oOPnfuFAxUAAAAAHQAAAAAQOw&biw=1629&bih=939&dpr=2.2#arid=ChdDSUhNMG9nS0VJQ0FnSUNCaHJ5NjB3RRAB">
                        <i class="fa fa-google-plus" aria-hidden="true"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
